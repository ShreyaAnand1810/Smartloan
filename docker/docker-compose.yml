services:
  web:
    build:
      context: ..
      dockerfile: Dockerfile
    command: sh -c "python manage.py migrate && python manage.py seed_data && gunicorn backend.wsgi:application --bind 0.0.0.0:8000"
    ports:
      - "8000:8000"
    env_file:
      - ../.env.example
    environment:
      DJANGO_DEBUG: "False"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1"
      DATABASE_URL: "postgres://smartloan:smartloan@db:5432/smartloan"
    volumes:
      - smartloan_media:/app/media
    depends_on:
      - db
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: smartloan
      POSTGRES_USER: smartloan
      POSTGRES_PASSWORD: smartloan
    volumes:
      - smartloan_pg:/var/lib/postgresql/data

volumes:
  smartloan_media:
  smartloan_pg:

{% extends "base.html" %}
{% block content %}
<section class="auth-wrap">
  <form method="post" class="auth-card">
    {% csrf_token %}
    <h1>Login</h1>
    {{ form.as_p }}
    <button class="btn btn-primary w-100">Login</button>
    <a href="{% url 'password_reset' %}">Forgot password?</a>
  </form>
</section>
{% endblock %}
